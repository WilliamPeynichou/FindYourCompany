name: Deploy to O2Switch via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to trouvetaboite.com
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔍 Debug - Check secrets
        run: |
          echo "FTP_HOST length: ${#FTP_HOST}"
          echo "FTP_USER length: ${#FTP_USER}"
          echo "FTP_PASSWORD length: ${#FTP_PASSWORD}"
          if [ -z "$FTP_HOST" ]; then echo "FTP_HOST is EMPTY!"; else echo "FTP_HOST is set"; fi
          if [ -z "$FTP_USER" ]; then echo "FTP_USER is EMPTY!"; else echo "FTP_USER is set"; fi
          if [ -z "$FTP_PASSWORD" ]; then echo "FTP_PASSWORD is EMPTY!"; else echo "FTP_PASSWORD is set"; fi
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 📦 Install frontend dependencies
        run: |
          cd client
          npm install
      
      - name: 🏗️ Build frontend
        env:
          VITE_API_URL: https://trouvetaboite.com
        run: |
          cd client
          npm run build
      
      - name: 📤 Deploy Frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./client/dist/
          server-dir: /public_html/trouvetaboite.com/
          dangerous-clean-slate: false
      
      - name: 📤 Deploy Backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./server/
          server-dir: /nodejs/trouvetaboite-api/
          dangerous-clean-slate: false
          exclude: |
            **/node_modules/**
            **/.env
      
      - name: ✅ Deployment complete
        run: |
          echo "🎉 Déploiement réussi sur trouvetaboite.com"
