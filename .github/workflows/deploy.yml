name: Deploy to O2Switch

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to trouvetaboite.com
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 📦 Install frontend dependencies
        run: |
          cd client
          npm install
      
      - name: 🏗️ Build frontend
        env:
          VITE_API_URL: https://trouvetaboite.com
        run: |
          cd client
          npm run build
      
      - name: 📦 Create deployment archives
        run: |
          cd client/dist
          tar -czf ../../frontend.tar.gz .
          cd ../..
          cd server
          tar -czf ../backend.tar.gz --exclude='node_modules' .
          cd ..
      
      - name: 🔑 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Désactiver la vérification stricte des clés (plus simple)
          cat >> ~/.ssh/config << EOF
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config
      
      - name: 🔍 Debug - Test SSH connection
        run: |
          echo "Testing SSH connection to ${{ secrets.SSH_HOST }}..."
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo 'SSH connection successful!'"
      
      - name: 📤 Upload archives to server
        run: |
          scp -i ~/.ssh/deploy_key frontend.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/
          scp -i ~/.ssh/deploy_key backend.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/
      
      - name: 🚀 Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            # Déployer le frontend
            echo "📤 Déploiement du frontend..."
            mkdir -p ~/public_html/trouvetaboite.com
            cd ~/public_html/trouvetaboite.com
            tar -xzf ~/frontend.tar.gz
            rm ~/frontend.tar.gz
            echo "✅ Frontend déployé"
            
            # Déployer le backend
            echo "📤 Déploiement du backend..."
            mkdir -p ~/nodejs/trouvetaboite-api
            cd ~/nodejs/trouvetaboite-api
            tar -xzf ~/backend.tar.gz
            rm ~/backend.tar.gz
            echo "✅ Backend déployé"
            
            echo ""
            echo "🎉 Déploiement terminé !"
          ENDSSH
      
      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -f ~/.ssh/config
          rm -f frontend.tar.gz backend.tar.gz
      
      - name: ✅ Deployment complete
        run: |
          echo "🎉 Déploiement réussi sur trouvetaboite.com"
          echo "📝 Vérifiez : https://trouvetaboite.com"
          echo "📝 API Health : https://trouvetaboite.com/api/health"
