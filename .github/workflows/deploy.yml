name: Deploy to Railway

on:
  push:
    branches:
      - main

jobs:
  # ── Backend ────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy API (server)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy server to Railway
        working-directory: server
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_BACKEND }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Frontend ───────────────────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build (Vite)
        working-directory: client
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy client to Railway
        working-directory: client
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_FRONTEND }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
